# Jetpaas Docker Compose
#
# Full stack (Redis + API + Web):
#   docker compose up --build
#
# Redis only for local pnpm dev (recommended day-to-day workflow):
#   docker compose up redis
#   cp apps/server/.env.example apps/server/.env   # if needed
#   cp apps/web/.env.example apps/web/.env         # if needed
#   pnpm install && pnpm dev
#
# Build images without starting:
#   docker compose build

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass jetpaas-dev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jetpaas-dev", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - redis-data:/data

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: jetpaas-dev
      CORS_ORIGIN: http://localhost:3000
      SQLITE_PATH: /app/data/jetpaas.db
    volumes:
      - server-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser on the host reaches the API via the published server port.
        VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      server:
        condition: service_healthy

volumes:
  redis-data:
  server-data:
